name: Docker build->push->deploy

on:
  push:
    branches: [ "main" ]

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Jar file
      run: 
        chmod +x ./mvnw
        ./mvnw clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME}}
        password: ${{ secrets.DOCKERHUB_TOKEN}}

    - name: Build Docker Image
      run: docker build -t ${{secrets.DOCKERHUB_USERNAME}}/springhello:latest .

    - name: Push Image to Docker Hub
      run: docker push ${{secrets.DOCKERHUB_USERNAME}}//springhello:latest

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script:
          docker stop springhello || true
          docker rm springhello || true
          docker pull ${{secrets.DOCKERHUBUSERNAME}}/springhello:latest
          docker run -d --name springhello -p 8080:8080 ${{secrets.DOCKERHUBUSERNAME}}/springhello:latest
